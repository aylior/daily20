<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily10 | Custom YouTube Trainer</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* Modern Dark Theme */
        :root { --bg: #121212; --card: #1e1e1e; --neon: #ccff00; --text: #ffffff; --dim: #888888; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 40px; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #333; }
        
        /* Typography & Inputs */
        h1, h2, h3 { margin-top: 0; }
        input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; width: 100%; box-sizing: border-box; font-size: 16px; }
        
        /* Buttons */
        button { background: var(--neon); color: black; border: none; padding: 14px; border-radius: 10px; font-weight: 800; font-size: 16px; width: 100%; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        button:active { transform: scale(0.97); }
        .btn-secondary { background: #333; color: white; }
        .btn-danger { background: transparent; color: #ff4d4d; padding: 8px; width: auto; font-size: 20px; }
        
        /* Calendar Heatmap */
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 15px; }
        .day { aspect-ratio: 1; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 12px; border-radius: 6px; font-weight: bold; color: var(--dim); }
        .complete { background: var(--neon); color: black; }
        .partial { border: 2px solid var(--neon); color: var(--neon); background: transparent; }
        
        /* Layout Utils */
        .flex-row { display: flex; align-items: center; gap: 15px; }
        .flex-between { display: flex; align-items: center; justify-content: space-between; }
        .thumb { width: 100px; height: 60px; border-radius: 8px; object-fit: cover; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; margin-bottom: 20px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- UTILITIES ---
        const getYTID = (url) => {
            const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
            return (match && match[2].length === 11) ? match[2] : null;
        };

        const parseTime = (str) => {
            if (!str) return 0;
            if (str.includes(':')) {
                const [m, s] = str.split(':').map(Number);
                return (m * 60) + (s || 0);
            }
            return parseInt(str) || 0;
        };

        // --- WAKE LOCK API ---
        let wakeLock = null;
        const toggleWakeLock = async (enable) => {
            try {
                if (enable && 'wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                } else if (!enable && wakeLock) {
                    wakeLock.release();
                    wakeLock = null;
                }
            } catch (err) { console.log('Wake Lock error:', err); }
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [view, setView] = useState('home'); // 'home', 'lib', 'workout'
            const [library, setLibrary] = useState(JSON.parse(localStorage.getItem('lib') || '[]'));
            const [history, setHistory] = useState(JSON.parse(localStorage.getItem('hist') || '{}'));
            
            // Workout State
            const [plan, setPlan] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [timeLeft, setTimeLeft] = useState(0);
            const [isActive, setIsActive] = useState(false);

            // Save library helper
            const updateLibrary = (newLib) => {
                setLibrary(newLib);
                localStorage.setItem('lib', JSON.stringify(newLib));
            };

            // 1. Generate 10 Min Workout
            const startWorkout = () => {
                const shuffled = [...library].sort(() => 0.5 - Math.random());
                let newPlan = [];
                let totalMins = 0;
                
                for (let ex of shuffled) {
                    if (totalMins + ex.duration <= 10) {
                        newPlan.push(ex);
                        totalMins += ex.duration;
                    }
                }

                if (newPlan.length === 0) return alert("Add some exercises to your library first!");
                
                setPlan(newPlan);
                setCurrentIdx(0);
                setTimeLeft(newPlan[0].duration * 60); // Convert mins to seconds
                setIsActive(true);
                setView('workout');
                toggleWakeLock(true);
            };

            // 2. Workout Timer Logic
            useEffect(() => {
                let interval = null;
                if (isActive && timeLeft > 0) {
                    interval = setInterval(() => setTimeLeft(t => t - 1), 1000);
                } else if (isActive && timeLeft === 0) {
                    handleNextExercise();
                }
                return () => clearInterval(interval);
            }, [isActive, timeLeft]);

            const handleNextExercise = () => {
                if (currentIdx < plan.length - 1) {
                    setIsActive(false); // Pause for transition
                    alert("Time's up! Ready for the next exercise?");
                    setCurrentIdx(currentIdx + 1);
                    setTimeLeft(plan[currentIdx + 1].duration * 60);
                    setIsActive(true);
                } else {
                    finishWorkout(10);
                }
            };

            // 3. Complete Workout
            const finishWorkout = (minsCompleted) => {
                const today = new Date().toISOString().split('T')[0];
                const newHist = {...history, [today]: (history[today] || 0) + minsCompleted};
                setHistory(newHist);
                localStorage.setItem('hist', JSON.stringify(newHist));
                toggleWakeLock(false);
                setIsActive(false);
                setView('home');
                if (minsCompleted >= 10) alert("Workout Complete! Streak updated.");
            };

            // 4. Sync Functions
            const exportData = () => {
                navigator.clipboard.writeText(btoa(JSON.stringify(library)));
                alert("Library copied to clipboard!");
            };
            const importData = () => {
                const code = prompt("Paste your library code here:");
                if (code) {
                    try { updateLibrary(JSON.parse(atob(code))); } 
                    catch { alert("Invalid code."); }
                }
            };

            // --- RENDER ---
            return (
                <div className="container">
                    <header className="flex-between" style={{ padding: '20px 0', borderBottom: '1px solid #333', marginBottom: '20px' }}>
                        <h1 onClick={() => setView('home')} style={{ margin: 0, color: 'var(--neon)', cursor: 'pointer', letterSpacing: '1px' }}>⚡ DAILY10</h1>
                        {view !== 'workout' && (
                            <button className="btn-secondary" style={{ width: 'auto', padding: '8px 16px' }} onClick={() => setView(view === 'home' ? 'lib' : 'home')}>
                                {view === 'home' ? 'My Library' : '← Back'}
                            </button>
                        )}
                    </header>

                    {/* --- VIEW: HOME / DASHBOARD --- */}
                    {view === 'home' && (
                        <div>
                            <div className="card" style={{ textAlign: 'center', padding: '40px 20px' }}>
                                <h2 style={{ fontSize: '24px' }}>Ready for your 10 minutes?</h2>
                                <p style={{ color: 'var(--dim)', marginBottom: '30px' }}>{library.length} exercises in your library.</p>
                                <button onClick={startWorkout} style={{ fontSize: '18px', padding: '18px' }}>Start Today's Session</button>
                            </div>
                            
                            <h3 style={{ marginTop: '30px' }}>Consistency Heatmap</h3>
                            <div className="calendar">
                                {[...Array(28)].map((_, i) => {
                                    // Simulated 28-day view for current month
                                    const date = new Date();
                                    date.setDate(date.getDate() - (27 - i));
                                    const dateString = date.toISOString().split('T')[0];
                                    const val = history[dateString] || 0;
                                    
                                    let statusClass = '';
                                    if (val >= 10) statusClass = 'complete';
                                    else if (val > 0) statusClass = 'partial';
                                    
                                    return <div key={i} className={`day ${statusClass}`}>{date.getDate()}</div>
                                })}
                            </div>
                        </div>
                    )}

                    {/* --- VIEW: LIBRARY --- */}
                    {view === 'lib' && (
                        <div>
                            <form className="card" onSubmit={(e) => {
                                e.preventDefault();
                                const d = new FormData(e.target);
                                updateLibrary([{
                                    id: Date.now(), 
                                    title: d.get('title') || 'Exercise', 
                                    url: d.get('url'), 
                                    duration: parseInt(d.get('dur')), 
                                    start: parseTime(d.get('start'))
                                }, ...library]);
                                e.target.reset();
                            }}>
                                <h3>Add New Video</h3>
                                <input name="url" placeholder="YouTube URL (required)" required />
                                <input name="title" placeholder="Exercise Name (e.g. Burpees)" required />
                                <div className="flex-row">
                                    <input name="dur" placeholder="Mins" type="number" required />
                                    <input name="start" placeholder="Start At (e.g. 1:15)" />
                                </div>
                                <button type="submit">Save to Library</button>
                            </form>

                            {library.map(ex => (
                                <div key={ex.id} className="card flex-row">
                                    <img className="thumb" src={`https://img.youtube.com/vi/${getYTID(ex.url)}/mqdefault.jpg`} alt="thumb" />
                                    <div style={{ flex: 1 }}>
                                        <h4 style={{ margin: '0 0 5px 0' }}>{ex.title}</h4>
                                        <div style={{ color: 'var(--neon)', fontSize: '14px' }}>{ex.duration} mins</div>
                                    </div>
                                    <button className="btn-danger" onClick={() => updateLibrary(library.filter(i => i.id !== ex.id))}>✕</button>
                                </div>
                            ))}

                            <div className="flex-row" style={{ marginTop: '30px' }}>
                                <button className="btn-secondary" onClick={exportData}>📤 Export</button>
                                <button className="btn-secondary" onClick={importData}>📥 Import</button>
                            </div>
                        </div>
                    )}

                    {/* --- VIEW: ACTIVE WORKOUT --- */}
                    {view === 'workout' && plan.length > 0 && (
                        <div>
                            <div className="flex-between" style={{ marginBottom: '15px' }}>
                                <span style={{ color: 'var(--dim)' }}>Exercise {currentIdx + 1} of {plan.length}</span>
                                <span style={{ color: 'var(--neon)', fontWeight: 'bold', fontSize: '20px' }}>
                                    {Math.floor(timeLeft / 60)}:{(timeLeft % 60).toString().padStart(2, '0')}
                                </span>
                            </div>

                            <div className="video-container">
                                <iframe 
                                    src={`https://www.youtube.com/embed/${getYTID(plan[currentIdx].url)}?start=${plan[currentIdx].start}&autoplay=1&playsinline=1`} 
                                    allow="autoplay; encrypted-media" 
                                    allowFullScreen
                                ></iframe>
                            </div>

                            <h2 style={{ textAlign: 'center', marginBottom: '20px' }}>{plan[currentIdx].title}</h2>

                            <div className="flex-row">
                                <button onClick={() => setIsActive(!isActive)}>
                                    {isActive ? 'Pause Timer' : 'Resume Timer'}
                                </button>
                                <button className="btn-secondary" onClick={handleNextExercise}>Skip</button>
                            </div>
                            
                            <button className="btn-danger" style={{ width: '100%', marginTop: '20px', fontSize: '16px' }} onClick={() => finishWorkout(Math.floor((10 * 60 - plan.reduce((acc, curr, idx) => idx >= currentIdx ? acc + curr.duration * 60 : acc, 0) + timeLeft) / 60))}>
                                End Workout Early
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
