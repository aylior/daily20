<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily20 Pro | v34</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --neon: #ff9900; --text: #ffffff; --dim: #888888; --danger: #ff4d4d; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; padding-bottom: 50px; }
        .card { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid #333; }
        label { display: block; font-size: 11px; color: var(--neon); margin-bottom: 4px; font-weight: bold; text-transform: uppercase; }
        input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 14px; margin-bottom: 12px; }
        button { background: var(--neon); color: black; border: none; padding: 14px; border-radius: 10px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; }
        .btn-sec { background: #333; color: white; margin-top: 8px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 15px; }
        .cal-day { aspect-ratio: 1; border-radius: 6px; background: #2a2a2a; font-size: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .cal-day.done { background: var(--neon); color: black; font-weight: bold; }
        .cal-day.today { border: 1.5px solid var(--neon); }
        .lib-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #333; }
        .lib-thumb { width: 50px; height: 30px; border-radius: 4px; object-fit: cover; }
        .edit-box { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid #444; }
        .carousel { display: flex; overflow-x: auto; gap: 10px; padding: 5px 0; margin-bottom: 15px; }
        .carousel-item { flex: 0 0 100px; text-align: center; }
        .carousel-thumb { width: 100px; height: 60px; border-radius: 8px; object-fit: cover; border: 2px solid transparent; }
        .selected .carousel-thumb { border-color: var(--neon); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [view, setView] = useState('home');
            const [lib, setLib] = useState(() => JSON.parse(localStorage.getItem('d20_v34_lib')) || []);
            const [hist, setHist] = useState(() => JSON.parse(localStorage.getItem('d20_v34_hist')) || {});
            const [goal, setGoal] = useState(20);
            const [editingId, setEditingId] = useState(null);
            const [inspectingDate, setInspectingDate] = useState(null);
            const [selectedId, setSelectedId] = useState(null);

            useEffect(() => {
                localStorage.setItem('d20_v34_lib', JSON.stringify(lib));
                localStorage.setItem('d20_v34_hist', JSON.stringify(hist));
            }, [lib, hist]);

            // Conversion Helpers
            const toSecs = (mm_ss) => {
                if (!mm_ss || !mm_ss.includes(':')) return parseInt(mm_ss) || 0;
                const [m, s] = mm_ss.split(':');
                return (parseInt(m) * 60) + (parseInt(s) || 0);
            };
            const fromSecs = (s) => {
                const mins = Math.floor(s / 60);
                const secs = s % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            const getYTID = (u) => u?.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|.*\/|.*embed\/))([^&?\s]{11})/)?.[1];
            const getThumb = (v) => v.url.includes('instagram.com') ? 'https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg' : `https://img.youtube.com/vi/${getYTID(v.url)}/mqdefault.jpg`;

            const getCalendarDays = () => {
                const days = []; const today = new Date();
                for (let i = 27; i >= 0; i--) {
                    const d = new Date(); d.setDate(today.getDate() - i);
                    days.push({ date: d.getDate(), key: d.toISOString().split('T')[0], full: d.toDateString() });
                }
                return days;
            };

            return (
                <div className="container">
                    <h1 style={{textAlign:'center', color:'var(--neon)', letterSpacing:2}}>DAILY20</h1>

                    {view === 'home' && (
                        <main>
                            <div className="card">
                                <div className="carousel">
                                    {lib.map(v => (
                                        <div key={v.id} className={`carousel-item ${selectedId === v.id ? 'selected' : ''}`} onClick={() => setSelectedId(v.id)}>
                                            <img className="carousel-thumb" src={getThumb(v)} />
                                            <div style={{fontSize:10, color:'white'}}>{v.title}</div>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => alert("Workout view is standard. Let's focus on library/edit fixes.")}>Start Training</button>
                                <button className="btn-sec" onClick={() => setView('lib')}>Library & Settings</button>
                            </div>

                            <div className="daily-stat">
                                <div className="cal-grid">
                                    {getCalendarDays().map(d => (
                                        <div key={d.key} className={`cal-day ${ (hist[d.key]?.totalMins || 0) >= goal ? 'done' : ''}`} onClick={() => setInspectingDate(d)}>
                                            {d.date}
                                            <small style={{fontSize:8}}>{hist[d.key]?.totalMins || 0}m</small>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </main>
                    )}

                    {view === 'lib' && (
                        <main>
                            <button className="btn-sec" style={{marginBottom:15}} onClick={() => setView('home')}>← Back Home</button>
                            
                            <form className="card" onSubmit={e => {
                                e.preventDefault();
                                const f = new FormData(e.target);
                                const newVid = {
                                    id: Date.now(),
                                    title: f.get('t'),
                                    url: f.get('u'),
                                    durSec: toSecs(f.get('d')), // Store as total seconds
                                    startSec: toSecs(f.get('s'))
                                };
                                setLib([...lib, newVid]);
                                e.target.reset();
                            }}>
                                <label>Video URL</label>
                                <input name="u" placeholder="YouTube or Instagram link" required />
                                <label>Video Title</label>
                                <input name="t" placeholder="e.g. Morning Yoga" required />
                                <div style={{display:'flex', gap:10}}>
                                    <div style={{flex:1}}><label>Total Duration (mm:ss)</label><input name="d" placeholder="10:00" required /></div>
                                    <div style={{flex:1}}><label>Start At (mm:ss)</label><input name="s" placeholder="0:00" /></div>
                                </div>
                                <button type="submit">Add to Library</button>
                            </form>

                            <div className="card">
                                {lib.map(v => (
                                    <div key={v.id}>
                                        <div className="lib-item">
                                            <img className="lib-thumb" src={getThumb(v)} />
                                            <div style={{flexGrow:1}}>
                                                <div style={{fontWeight:'bold'}}>{v.title}</div>
                                                <small style={{color:'var(--dim)'}}>{fromSecs(v.durSec)}</small>
                                            </div>
                                            <button style={{width:40, padding:5}} onClick={() => setEditingId(editingId === v.id ? null : v.id)}>✎</button>
                                        </div>
                                        {editingId === v.id && (
                                            <div className="edit-box">
                                                <label>Title</label>
                                                <input defaultValue={v.title} onBlur={e => setLib(lib.map(x => x.id === v.id ? {...x, title: e.target.value} : x))} />
                                                
                                                <label>Duration (mm:ss)</label>
                                                <input defaultValue={fromSecs(v.durSec)} onBlur={e => setLib(lib.map(x => x.id === v.id ? {...x, durSec: toSecs(e.target.value)} : x))} />
                                                
                                                <label>Start Timestamp (mm:ss)</label>
                                                <input defaultValue={fromSecs(v.startSec || 0)} onBlur={e => setLib(lib.map(x => x.id === v.id ? {...x, startSec: toSecs(e.target.value)} : x))} />
                                                
                                                <button className="btn-sec" style={{background:'var(--danger)'}} onClick={() => setLib(lib.filter(x => x.id !== v.id))}>Delete Video</button>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </main>
                    )}

                    {inspectingDate && (
                        <div className="overlay" onClick={() => setInspectingDate(null)}>
                            <div className="card" style={{width:'85%'}} onClick={e => e.stopPropagation()}>
                                <h3>{inspectingDate.full}</h3>
                                <p>Total Training: {hist[inspectingDate.key]?.totalMins || 0}m</p>
                                <div style={{maxHeight:150, overflowY:'auto', borderTop:'1px solid #333', paddingTop:10}}>
                                    {hist[inspectingDate.key]?.videos || "No videos logged."}
                                </div>
                                <button className="btn-sec" onClick={() => setInspectingDate(null)}>Close</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
