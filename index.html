<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 256 256'><rect width='256' height='256' fill='black'/><path d='M45 35 L220 128 L45 221 Z' fill='black' stroke='%23FF9900' stroke-width='15' stroke-linejoin='round'/><text x='115' y='135' text-anchor='middle' font-family='sans-serif' font-weight='900' font-size='72' fill='%23FF9900'>UT</text></svg>">
    <title>UTrainTube</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --neon: #ff9900; --text: #ffffff; --dim: #888888; --danger: #ff4d4d; --safe: #2ecc71; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 10px; overflow-x: hidden; height: 100vh; }
        .container { max-width: 480px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; }
        
        /* Header */
        .header-box { display: flex; flex-direction: row; align-items: center; justify-content: center; margin-bottom: 25px; gap: 15px; }
        .app-icon-svg { width: 55px; height: 55px; flex-shrink: 0; border-radius: 12px; }
        .app-title { color: var(--neon); margin: 0; font-size: 32px; font-weight: 900; letter-spacing: -1px; line-height: 1; }
        .v-tag { color: var(--dim); font-size: 12px; font-family: monospace; font-weight: 700; margin-left: 8px; }

        /* Cards & UI */
        .card { background: var(--card); padding: 16px; border-radius: 20px; margin-bottom: 12px; border: 1px solid #282828; }
        .btn-row { display: flex; gap: 8px; margin-bottom: 12px; }
        button { background: var(--neon); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 13px; flex: 1; }
        .btn-sec { background: #2a2a2a; color: white; }
        svg.btn-svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        
        input, select { background: #222; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; font-size: 14px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        label { font-size: 10px; font-weight: 800; color: var(--neon); text-transform: uppercase; margin-bottom: 4px; display: block; }

        /* Carousel */
        .carousel { display: flex; overflow-x: auto; gap: 12px; padding: 10px 0 20px 0; scrollbar-width: none; }
        .thumb-wrap { position: relative; width: 120px; height: 68px; border-radius: 12px; overflow: hidden; border: 2px solid transparent; background: #000; flex-shrink: 0; }
        .thumb-wrap.selected { border-color: var(--neon); transform: scale(1.05); transition: transform 0.2s; }

        /* Stats & Calendar */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 8px; }
        .cal-day { aspect-ratio: 1; border-radius: 8px; background: #1f1f1f; font-size: 9px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1.5px solid transparent; }
        .cal-day.today { border-color: var(--neon); }
        .cal-day.has-data { color: var(--neon); font-weight: bold; }

        /* Workout Overlay */
        .workout-ui { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; }
        .player-frame { width: 100%; flex: 1; background: #000; }
        .player-frame iframe { width: 100%; height: 100%; border: none; }
        .workout-footer { background: var(--bg); padding: 20px 20px 40px; border-top: 1px solid #333; text-align: center; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const AppIcon = () => (
            <svg className="app-icon-svg" viewBox="0 0 256 256" style={{background: 'black'}}>
                <path d="M 45 35 L 220 128 L 45 221 Z" fill="black" stroke="#FF9900" strokeWidth="15" strokeLinejoin="round" />
                <text x="115" y="135" dominantBaseline="middle" textAnchor="middle" fontFamily="sans-serif" fontWeight="900" fontSize="72" fill="#FF9900">UT</text>
            </svg>
        );

        const TrashIcon = () => <svg className="btn-svg" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;

        const getLocalDateKey = (d = new Date()) => {
            const offset = d.getTimezoneOffset() * 60000;
            return new Date(d.getTime() - offset).toISOString().split('T')[0];
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [lib, setLib] = useState(() => JSON.parse(localStorage.getItem('ut_lib')) || []);
            const [hist, setHist] = useState(() => JSON.parse(localStorage.getItem('ut_hist')) || {});
            const [goal, setGoal] = useState(() => parseInt(localStorage.getItem('ut_goal')) || 20);
            const [selectedId, setSelectedId] = useState(null);
            const [workout, setWorkout] = useState({ active: false, video: null });
            const [manualLog, setManualLog] = useState(false);
            const fileInputRef = useRef(null);
            const todayKey = getLocalDateKey();

            useEffect(() => {
                localStorage.setItem('ut_lib', JSON.stringify(lib));
                localStorage.setItem('ut_hist', JSON.stringify(hist));
                localStorage.setItem('ut_goal', goal.toString());
            }, [lib, hist, goal]);

            const exportData = () => {
                const bundle = { lib, hist, goal, exportedAt: new Date().toISOString() };
                const blob = new Blob([JSON.stringify(bundle, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `UTrainTube_Backup_${todayKey}.json`;
                a.click();
                URL.revokeObjectURL(url);
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = JSON.parse(evt.target.result);
                        if (data.lib) setLib(data.lib);
                        if (data.hist) setHist(data.hist);
                        if (data.goal) setGoal(data.goal);
                        alert("Imported!");
                    } catch (err) { alert("Invalid file"); }
                };
                reader.readAsText(file);
            };

            const addActivity = (label, mins) => {
                setHist(prev => {
                    const day = prev[todayKey] || { items: [] };
                    return { ...prev, [todayKey]: { items: [...day.items, { label, mins: parseFloat(mins) }] } };
                });
            };

            const getDailyTotal = (key) => {
                return (hist[key]?.items || []).reduce((acc, i) => acc + i.mins, 0);
            };

            return (
                <div className="container">
                    <header className="header-box">
                        <AppIcon />
                        <div>
                            <h1 className="app-title">UTrainTube <span className="v-tag">v0.1</span></h1>
                        </div>
                    </header>

                    {view === 'home' && (
                        <>
                            <div className="card">
                                <label>Daily Goal</label>
                                <select value={goal} onChange={e => setGoal(parseInt(e.target.value))}>
                                    {[10, 20, 30, 45, 60].map(g => <option key={g} value={g}>{g} Minutes</option>)}
                                </select>
                                <div className="carousel">
                                    {lib.map(v => (
                                        <div key={v.id} className={`thumb-wrap ${selectedId === v.id ? 'selected' : ''}`} onClick={() => setSelectedId(v.id)}>
                                            <img src={`https://img.youtube.com/vi/${v.url.split('v=')[1]?.split('&')[0]}/mqdefault.jpg`} style={{width:'100%', height:'100%', objectFit:'cover'}} />
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => {
                                    const v = lib.find(x => x.id === selectedId) || lib[0];
                                    if (v) { setWorkout({ active: true, video: v }); setView('workout'); }
                                }}>Start Workout</button>
                                <div className="btn-row" style={{marginTop:10}}>
                                    <button className="btn-sec" onClick={() => setView('lib')}>Library</button>
                                    <button className="btn-sec" onClick={() => setManualLog(true)}>Quick Log</button>
                                </div>
                            </div>
                            <div className="card">
                                <div style={{textAlign:'center', fontSize:24, fontWeight:900, marginBottom:10}}>{Math.floor(getDailyTotal(todayKey))} / {goal}m</div>
                                <div className="cal-grid">
                                    {Array.from({length: 14}).map((_, i) => {
                                        const d = new Date(); d.setDate(d.getDate() - (13 - i));
                                        const k = getLocalDateKey(d);
                                        const total = getDailyTotal(k);
                                        return <div key={k} className={`cal-day ${k === todayKey ? 'today' : ''} ${total > 0 ? 'has-data' : ''}`}>{d.getDate()}</div>;
                                    })}
                                </div>
                            </div>
                        </>
                    )}

                    {view === 'lib' && (
                        <div className="card">
                            <button className="btn-sec" onClick={() => setView('home')}>← Back</button>
                            <div className="btn-row" style={{marginTop:10}}>
                                <button onClick={exportData}>Export</button>
                                <button onClick={() => fileInputRef.current.click()}>Import</button>
                            </div>
                            <input type="file" ref={fileInputRef} style={{display:'none'}} onChange={importData} />
                            <hr style={{borderColor:'#333', margin:'20px 0'}} />
                            <form onSubmit={(e) => {
                                e.preventDefault();
                                const f = new FormData(e.target);
                                setLib([{ id: Date.now(), title: f.get('t'), url: f.get('u') }, ...lib]);
                                e.target.reset();
                            }}>
                                <input name="t" placeholder="Video Title" required />
                                <input name="u" placeholder="YouTube URL" required />
                                <button type="submit">Add to Library</button>
                            </form>
                            <div style={{marginTop:20}}>
                                {lib.map(v => (
                                    <div key={v.id} style={{display:'flex', justifyContent:'space-between', padding:'10px 0', borderBottom:'1px solid #333'}}>
                                        <span style={{fontSize:14}}>{v.title}</span>
                                        <div onClick={() => setLib(lib.filter(x => x.id !== v.id))}><TrashIcon /></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {view === 'workout' && workout.video && (
                        <div className="workout-ui">
                            <div className="player-frame">
                                <iframe src={`https://www.youtube.com/embed/${workout.video.url.split('v=')[1]?.split('&')[0]}?autoplay=1`} allow="autoplay"></iframe>
                            </div>
                            <div className="workout-footer">
                                <h3>{workout.video.title}</h3>
                                <button onClick={() => {
                                    addActivity(workout.video.title, 15);
                                    setView('home');
                                    setWorkout({ active: false, video: null });
                                }}>Finish (Log 15m)</button>
                                <button className="btn-sec" style={{marginTop:10}} onClick={() => setView('home')}>Cancel</button>
                            </div>
                        </div>
                    )}

                    {manualLog && (
                        <div className="overlay" onClick={() => setManualLog(false)}>
                            <div className="card" style={{width:'85%'}} onClick={e => e.stopPropagation()}>
                                <h3>Manual Log</h3>
                                <input id="mL" placeholder="Activity (e.g. Run)" />
                                <input id="mM" type="number" placeholder="Minutes" />
                                <button onClick={() => {
                                    addActivity(document.getElementById('mL').value || 'Manual', document.getElementById('mM').value || 0);
                                    setManualLog(false);
                                }}>Save Activity</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
