<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily20 Pro | Thumbnails</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --neon: #ff9900; --text: #ffffff; --dim: #888888; --danger: #ff4d4d; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; padding-bottom: 60px; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #333; position: relative; }
        input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; width: 100%; box-sizing: border-box; font-size: 16px; }
        button { background: var(--neon); color: black; border: none; padding: 14px; border-radius: 10px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; }
        .btn-sec { background: #333; color: white; margin-top: 10px; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 20px; }
        .day { aspect-ratio: 1; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; color: var(--dim); }
        .day.complete { background: var(--neon); color: black; box-shadow: 0 0 15px rgba(255,153,0,0.4); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 16px; overflow: hidden; background: #000; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        /* Thumbnail Styles */
        .thumb-box { width: 80px; height: 50px; border-radius: 8px; overflow: hidden; margin-right: 15px; background: #000; flex-shrink: 0; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .lib-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2a2a2a; }
        .lib-info { display: flex; align-items: center; flex-grow: 1; }

        .celebrate { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .celebrate h1 { color: var(--neon); font-size: 42px; text-shadow: 0 0 20px var(--neon); animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('home');
            const [lib, setLib] = useState(() => JSON.parse(localStorage.getItem('d20_lib_v4') || '[]'));
            const [hist, setHist] = useState(() => JSON.parse(localStorage.getItem('d20_hist_v4') || '{}'));
            const [selectedDay, setSelectedDay] = useState(null);
            const [isDone, setIsDone] = useState(false);
            const [workout, setWorkout] = useState({ plan: [], idx: 0, seconds: 0 });

            useEffect(() => {
                localStorage.setItem('d20_lib_v4', JSON.stringify(lib));
                localStorage.setItem('d20_hist_v4', JSON.stringify(hist));
            }, [lib, hist]);

            useEffect(() => {
                let timer;
                if (view === 'workout' && workout.seconds > 0) {
                    timer = setInterval(() => setWorkout(w => ({ ...w, seconds: w.seconds - 1 })), 1000);
                } else if (view === 'workout' && workout.seconds === 0 && workout.plan.length > 0) {
                    if (workout.idx < workout.plan.length - 1) {
                        const nextIdx = workout.idx + 1;
                        setWorkout(w => ({ ...w, idx: nextIdx, seconds: parseInt(w.plan[nextIdx].dur) * 60 }));
                    } else {
                        finishSession();
                    }
                }
                return () => clearInterval(timer);
            }, [view, workout.seconds]);

            const getYTID = (u) => {
                const match = u.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|.*\/|.*embed\/))([^&?\s]{11})/);
                return match ? match[1] : null;
            };

            const startTraining = () => {
                if (!lib.length) return alert("Add videos first!");
                const shuffled = [...lib].sort(() => 0.5 - Math.random());
                let plan = [], total = 0;
                for (let v of shuffled) {
                    if (total + parseInt(v.dur) <= 21) {
                        plan.push(v);
                        total += parseInt(v.dur);
                    }
                }
                setWorkout({ plan, idx: 0, seconds: parseInt(plan[0].dur) * 60 });
                setView('workout');
                if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(() => {});
            };

            const finishSession = () => {
                const today = new Date().toISOString().split('T')[0];
                const dayData = hist[today] || { mins: 0, vids: [] };
                setHist({ ...hist, [today]: {
                    mins: Math.min(dayData.mins + 20, 20),
                    vids: [...new Set([...dayData.vids, ...workout.plan.map(v => v.title)])]
                }});
                setIsDone(true);
                setView('home');
                setWorkout({ plan: [], idx: 0, seconds: 0 });
                setTimeout(() => setIsDone(false), 5000);
            };

            return (
                <div className="container">
                    {isDone && <div className="celebrate" onClick={() => setIsDone(false)}><h1>MISSION COMPLETE</h1><p>20 MINS LOGGED</p></div>}
                    
                    <h1 style={{color: 'var(--neon)', textAlign:'center'}} onClick={() => setView('home')}>DAILY20</h1>

                    {view === 'home' && (
                        <div>
                            <div className="card" style={{textAlign:'center'}}>
                                <button onClick={startTraining} style={{fontSize:'18px'}}>Start 20-Min Session</button>
                                <button className="btn-sec" onClick={() => setView('lib')}>Manage Library</button>
                            </div>
                            <div className="calendar">
                                {[...Array(28)].map((_, i) => {
                                    const d = new Date(); d.setDate(d.getDate() - (27 - i));
                                    const s = d.toISOString().split('T')[0];
                                    const day = hist[s];
                                    return <div key={i} className={`day ${day?.mins >= 20 ? 'complete' : ''}`} onClick={() => day && setSelectedDay({date: s, ...day})}>{d.getDate()}</div>
                                })}
                            </div>
                        </div>
                    )}

                    {view === 'lib' && (
                        <div>
                            <form className="card" onSubmit={e => {
                                e.preventDefault();
                                const f = new FormData(e.target);
                                setLib([{ id: Date.now(), title: f.get('t'), url: f.get('u'), dur: f.get('d'), start: f.get('s') || 0 }, ...lib]);
                                e.target.reset();
                            }}>
                                <h3>Add New Workout</h3>
                                <input name="u" placeholder="YouTube URL" required />
                                <input name="t" placeholder="Title" required />
                                <div style={{display:'flex', gap:'10px'}}>
                                    <input name="d" type="number" placeholder="Mins" required />
                                    <input name="s" type="number" placeholder="Start at (Secs)" />
                                </div>
                                <button type="submit">Add to Library</button>
                            </form>
                            
                            <div className="card">
                                {lib.map(v => (
                                    <div key={v.id} className="lib-row">
                                        <div className="lib-info">
                                            <div className="thumb-box">
                                                <img src={`https://img.youtube.com/vi/${getYTID(v.url)}/mqdefault.jpg`} alt="thumb" />
                                            </div>
                                            <div>
                                                <div style={{fontWeight:'bold', fontSize:'14px'}}>{v.title}</div>
                                                <div style={{fontSize:'12px', color:'var(--dim)'}}>{v.dur}m | Start: {v.start}s</div>
                                            </div>
                                        </div>
                                        <button onClick={() => setLib(lib.filter(x => x.id !== v.id))} style={{background:'var(--danger)', width:'35px', padding:'5px'}}>✕</button>
                                    </div>
                                ))}
                            </div>
                            <button className="btn-sec" onClick={() => setView('home')}>Back</button>
                        </div>
                    )}

                    {view === 'workout' && workout.plan.length > 0 && (
                        <div style={{textAlign: 'center'}}>
                            <div className="video-container">
                                <iframe src={`https://www.youtube.com/embed/${getYTID(workout.plan[workout.idx].url)}?autoplay=1&start=${workout.plan[workout.idx].start}&rel=0`} allow="autoplay" allowFullScreen></iframe>
                            </div>
                            <div style={{fontSize:'54px', fontWeight:'900', color:'var(--neon)'}}>
                                {Math.floor(workout.seconds / 60)}:{(workout.seconds % 60).toString().padStart(2, '0')}
                            </div>
                            <h3>{workout.plan[workout.idx].title}</h3>
                            <button className="btn-sec" style={{color:'var(--danger)'}} onClick={() => {if(confirm("Quit?")) setView('home')}}>Quit Session</button>
                        </div>
                    )}

                    {selectedDay && (
                        <div className="modal-overlay" onClick={() => setSelectedDay(null)}>
                            <div className="card" style={{width:'85%'}} onClick={e => e.stopPropagation()}>
                                <h2>{selectedDay.date}</h2>
                                <p>Progress: {selectedDay.mins} / 20 mins</p>
                                <div style={{textAlign:'left', fontSize:'13px', maxHeight:'150px', overflowY:'auto'}}>
                                    {selectedDay.vids.map((v, i) => <div key={i} style={{padding:'5px 0', borderBottom:'1px solid #333'}}>• {v}</div>)}
                                </div>
                                <button className="btn-sec" style={{color:'var(--danger)', marginTop:'15px'}} onClick={() => { if(confirm("Reset?")){ const n = {...hist}; delete n[selectedDay.date]; setHist(n); setSelectedDay(null); } }}>Reset Day</button>
                                <button className="btn-sec" onClick={() => setSelectedDay(null)}>Close</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
