<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily20 Pro | v19</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --neon: #ff9900; --text: #ffffff; --dim: #888888; --danger: #ff4d4d; --info: #3498db; --warning: #f39c12; --success: #2ecc71; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 10px; overflow-y: auto; }
        .container { max-width: 500px; margin: 0 auto; padding-bottom: 50px; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #333; position: relative; }
        input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; width: 100%; box-sizing: border-box; font-size: 16px; }
        button { background: var(--neon); color: black; border: none; padding: 14px; border-radius: 10px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; }
        .btn-sec { background: #333; color: white; margin-top: 10px; }
        
        /* PLAYER LOGIC */
        .player-wrapper { width: 100%; border-radius: 16px; overflow: hidden; background: #000; border: 1px solid #333; margin-bottom: 10px; position: relative; }
        .ratio-yt { aspect-ratio: 16/9; }
        .ratio-insta { aspect-ratio: 9/16; max-height: 60vh; } /* Vertical but bounded */
        #yt-player, .insta-player { width: 100%; height: 100%; border: 0; display: block; }

        /* LIBRARY & CALENDAR */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 11px; border-radius: 6px; background: #2a2a2a; color: #555; }
        .active-month { color: var(--text); }
        .complete { background: var(--neon); color: black; font-weight: bold; }
        .today { border: 1px solid var(--neon); }
        
        .lib-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #2a2a2a; }
        .icon-btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .icon-btn { background: #2a2a2a; border: 1px solid #444; color: white; padding: 10px; border-radius: 10px; flex: 1; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        
        .carousel { display: flex; overflow-x: auto; gap: 10px; padding: 5px; margin-bottom: 10px; }
        .carousel-item { flex: 0 0 80px; text-align: center; }
        .carousel-thumb { width: 80px; height: 50px; border-radius: 8px; object-fit: cover; border: 2px solid transparent; }
        .selected .carousel-thumb { border-color: var(--neon); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [view, setView] = useState('home');
            const [lib, setLib] = useState(() => JSON.parse(localStorage.getItem('d20_final_v19') || '[]'));
            const [hist, setHist] = useState(() => JSON.parse(localStorage.getItem('d20_hist_v19') || '{}'));
            const [selectedId, setSelectedId] = useState(null);
            const [editingVid, setEditingVid] = useState(null);
            const [calDate, setCalDate] = useState(new Date());
            const [workout, setWorkout] = useState({ plan: [], idx: 0, seconds: 0 });
            const [isPlaying, setIsPlaying] = useState(false);
            const [timerOverride, setTimerOverride] = useState(false);
            const playerRef = useRef(null);

            useEffect(() => {
                localStorage.setItem('d20_final_v19', JSON.stringify(lib));
                localStorage.setItem('d20_hist_v19', JSON.stringify(hist));
            }, [lib, hist]);

            const getYTID = (u) => u?.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|.*\/|.*embed\/))([^&?\s]{11})/)?.[1];
            const isInsta = (u) => u?.includes('instagram.com');
            const getThumb = (v) => isInsta(v.url) ? 'https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg' : `https://img.youtube.com/vi/${getYTID(v.url)}/mqdefault.jpg`;

            useEffect(() => {
                let timer;
                if (view === 'workout' && isPlaying && !timerOverride && workout.seconds > 0) {
                    timer = setInterval(() => setWorkout(w => ({ ...w, seconds: w.seconds - 1 })), 1000);
                } else if (view === 'workout' && workout.seconds === 0 && workout.plan.length > 0) {
                    handleSkip();
                }
                return () => clearInterval(timer);
            }, [view, isPlaying, timerOverride, workout.seconds]);

            useEffect(() => {
                if (view === 'workout' && workout.plan.length > 0) {
                    const vid = workout.plan[workout.idx];
                    if (!isInsta(vid.url)) {
                        const initYT = () => {
                            if (playerRef.current?.destroy) playerRef.current.destroy();
                            playerRef.current = new window.YT.Player('yt-player', {
                                videoId: getYTID(vid.url),
                                playerVars: { 'autoplay': 1, 'start': vid.start, 'playsinline': 1, 'controls': 1 },
                                events: { 'onStateChange': (e) => setIsPlaying(e.data === 1) }
                            });
                        };
                        window.YT ? initYT() : window.onYouTubeIframeAPIReady = initYT;
                    } else { setIsPlaying(true); }
                }
            }, [view, workout.idx]);

            const handleSkip = () => {
                if (workout.idx < workout.plan.length - 1) {
                    const next = workout.idx + 1;
                    setWorkout(w => ({ ...w, idx: next, seconds: parseInt(w.plan[next].dur) * 60 }));
                    setTimerOverride(false);
                } else { finish(); }
            };

            const finish = () => {
                setHist({...hist, [new Date().toISOString().split('T')[0]]: true });
                setView('home'); setSelectedId(null);
            };

            // Calendar Build
            const daysArr = [];
            const firstDay = new Date(calDate.getFullYear(), calDate.getMonth(), 1).getDay();
            const lastDate = new Date(calDate.getFullYear(), calDate.getMonth() + 1, 0).getDate();
            const prevLastDate = new Date(calDate.getFullYear(), calDate.getMonth(), 0).getDate();
            for (let i = firstDay - 1; i >= 0; i--) daysArr.push({ day: prevLastDate - i, current: false });
            for (let i = 1; i <= lastDate; i++) {
                const ds = `${calDate.getFullYear()}-${(calDate.getMonth()+1).toString().padStart(2,'0')}-${i.toString().padStart(2,'0')}`;
                daysArr.push({ day: i, current: true, ds });
            }

            return (
                <div className="container">
                    <h1 style={{color:'var(--neon)', textAlign:'center', margin:'10px 0'}} onClick={() => {setView('home'); setIsPlaying(false);}}>DAILY20</h1>

                    {view === 'home' && (
                        <div>
                            <div className="card" style={{textAlign:'center'}}>
                                <div className="carousel">
                                    {lib.map(v => (
                                        <div key={v.id} className={`carousel-item ${selectedId === v.id ? 'selected' : ''}`} onClick={() => setSelectedId(selectedId === v.id ? null : v.id)}>
                                            <img className="carousel-thumb" src={getThumb(v)} />
                                            <div style={{fontSize:'8px', marginTop:'4px', overflow:'hidden'}}>{v.title}</div>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => {
                                    if(!lib.length) return;
                                    const plan = selectedId ? [lib.find(v => v.id === selectedId), ...lib.filter(v => v.id !== selectedId)].slice(0,4) : lib.sort(() => 0.5 - Math.random()).slice(0,4);
                                    setWorkout({ plan, idx: 0, seconds: parseInt(plan[0].dur) * 60 });
                                    setView('workout');
                                }}>Start Training</button>
                                <button className="btn-sec" onClick={() => setView('lib')}>Manage Library</button>
                            </div>

                            <div className="card">
                                <div className="cal-header">
                                    <button style={{width:'auto', padding:'5px 10px'}} onClick={() => setCalDate(new Date(calDate.setMonth(calDate.getMonth()-1)))}>&lt;</button>
                                    <h4 style={{margin:0}}>{calDate.toLocaleString('default', { month: 'long', year: 'numeric' })}</h4>
                                    <button style={{width:'auto', padding:'5px 10px'}} onClick={() => setCalDate(new Date(calDate.setMonth(calDate.getMonth()+1)))}>&gt;</button>
                                </div>
                                <div className="cal-grid">
                                    {['S','M','T','W','T','F','S'].map(d => <div key={d} style={{textAlign:'center', fontSize:'9px', color:'var(--dim)'}}>{d}</div>)}
                                    {daysArr.map((d, i) => (
                                        <div key={i} className={`cal-cell ${d.current ? 'active-month' : ''} ${hist[d.ds] ? 'complete' : ''} ${d.ds === new Date().toISOString().split('T')[0] ? 'today' : ''}`}>
                                            {d.day}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'lib' && (
                        <div>
                            <form className="card" onSubmit={e => {
                                e.preventDefault(); const f = new FormData(e.target);
                                setLib([{ id: Date.now(), title: f.get('t'), url: f.get('u'), dur: f.get('d'), start: f.get('s') || 0 }, ...lib]);
                                e.target.reset();
                            }}>
                                <h3>Add Video</h3>
                                <input name="u" placeholder="URL (YouTube or Instagram)" required />
                                <input name="t" placeholder="Title" required />
                                <div style={{display:'flex', gap:'10px'}}>
                                    <input name="d" type="number" placeholder="Mins" required />
                                    <input name="s" type="number" placeholder="Start Sec" />
                                </div>
                                <button type="submit">Add to List</button>
                            </form>
                            
                            <div className="card">
                                {lib.map(v => (
                                    <div key={v.id} className="lib-row">
                                        <span style={{fontSize:'13px'}}>{v.title}</span>
                                        <div style={{display:'flex', gap:'5px'}}>
                                            <button onClick={() => setEditingVid(v)} style={{background:'var(--info)', width:'35px', padding:'5px'}}>✎</button>
                                            <button onClick={() => setLib(lib.filter(x => x.id !== v.id))} style={{background:'var(--danger)', width:'35px', padding:'5px'}}>✕</button>
                                        </div>
                                    </div>
                                ))}
                                <div className="icon-btn-group">
                                    <button className="icon-btn" onClick={() => {
                                        const blob = new Blob([JSON.stringify(lib)], {type:'application/json'});
                                        const url = URL.createObjectURL(blob);
                                        const a = document.createElement('a'); a.href = url; a.download = 'daily20_v19.json'; a.click();
                                    }}>Export</button>
                                    <label className="icon-btn">Import
                                        <input type="file" style={{display:'none'}} onChange={e => {
                                            const r = new FileReader(); r.onload = (ev) => setLib(JSON.parse(ev.target.result)); r.readAsText(e.target.files[0]);
                                        }} />
                                    </label>
                                </div>
                            </div>
                            <button className="btn-sec" onClick={() => setView('home')}>Back</button>
                        </div>
                    )}

                    {view === 'workout' && (
                        <div style={{textAlign:'center'}}>
                            <div className={`player-wrapper ${isInsta(workout.plan[workout.idx].url) ? 'ratio-insta' : 'ratio-yt'}`}>
                                {isInsta(workout.plan[workout.idx].url) ? (
                                    <iframe className="insta-player" src={`${workout.plan[workout.idx].url.split('?')[0]}embed`} allowTransparency="true" allowFullScreen></iframe>
                                ) : (
                                    <div id="yt-player"></div>
                                )}
                            </div>
                            
                            <div className="card" style={{padding:'10px', marginTop:'0'}}>
                                <div style={{fontSize:'48px', fontWeight:'900', color: (isPlaying && !timerOverride) ? 'var(--neon)' : 'var(--dim)', lineHeight:1}}>
                                    {Math.floor(workout.seconds/60)}:{(workout.seconds%60).toString().padStart(2,'0')}
                                </div>
                                <p style={{margin:'5px 0', fontSize:'14px'}}>{workout.plan[workout.idx].title}</p>
                                
                                <button onClick={() => setTimerOverride(!timerOverride)} style={{background: timerOverride ? 'var(--success)' : 'var(--warning)', width:'100%', marginBottom:'10px'}}>
                                    {timerOverride ? 'Resume Clock' : 'Pause Clock'}
                                </button>
                                
                                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px'}}>
                                    <button className="btn-sec" onClick={handleSkip} style={{margin:0}}>Skip</button>
                                    <button className="btn-sec" onClick={() => {setIsPlaying(false); setView('home');}} style={{margin:0}}>Exit</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {editingVid && (
                        <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.9)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:4000, padding:'20px'}}>
                            <form className="card" style={{width:'100%'}} onSubmit={e => {
                                e.preventDefault(); const f = new FormData(e.target);
                                setLib(lib.map(v => v.id === editingVid.id ? {...v, title: f.get('t'), url: f.get('u'), dur: f.get('d'), start: f.get('s') || 0 } : v));
                                setEditingVid(null);
                            }}>
                                <h3>Edit Video</h3>
                                <input name="u" defaultValue={editingVid.url} required />
                                <input name="t" defaultValue={editingVid.title} required />
                                <input name="d" type="number" defaultValue={editingVid.dur} required />
                                <input name="s" type="number" defaultValue={editingVid.start} />
                                <button type="submit">Save</button>
                                <button type="button" className="btn-sec" onClick={() => setEditingVid(null)}>Cancel</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
