<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily20 Pro | Legacy Calendar</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --neon: #ff9900; --text: #ffffff; --dim: #888888; --danger: #ff4d4d; --info: #3498db; --warning: #f39c12; --success: #2ecc71; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; padding-bottom: 80px; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #333; position: relative; }
        button { background: var(--neon); color: black; border: none; padding: 14px; border-radius: 10px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-sec { background: #333; color: white; margin-top: 10px; }
        
        /* Full Calendar UI */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .cal-day-label { font-size: 10px; color: var(--dim); text-align: center; padding-bottom: 5px; font-weight: bold; }
        .cal-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 13px; border-radius: 8px; background: #2a2a2a; color: #555; position: relative; }
        .cal-cell.active-month { color: var(--text); }
        .cal-cell.complete { background: var(--neon); color: black; font-weight: 800; box-shadow: 0 0 10px rgba(255, 153, 0, 0.3); }
        .cal-cell.today { border: 2px solid var(--neon); }
        .nav-btn { background: #333; color: white; padding: 5px 15px; border-radius: 6px; font-size: 18px; }

        /* Video Player */
        .player-wrapper { width: 100%; border-radius: 16px; overflow: hidden; background: #000; margin-bottom: 15px; border: 1px solid #333; transition: aspect-ratio 0.4s ease; }
        .ratio-yt { aspect-ratio: 16/9; }
        .ratio-insta { aspect-ratio: 9/16; max-height: 65vh; }
        #yt-player, .insta-player { width: 100%; height: 100%; border: 0; }

        .carousel { display: flex; overflow-x: auto; gap: 10px; padding: 5px; margin-bottom: 15px; }
        .carousel-item { flex: 0 0 90px; text-align: center; }
        .carousel-thumb { width: 90px; height: 60px; border-radius: 8px; object-fit: cover; border: 2px solid transparent; background: #333; }
        .selected .carousel-thumb { border-color: var(--neon); }
        .status-tag { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-bottom: 5px; }
        .status-paused { background: var(--danger); }
        .status-playing { background: var(--success); color: black; }
        .status-manual { background: var(--warning); color: black; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [view, setView] = useState('home');
            const [lib, setLib] = useState(() => JSON.parse(localStorage.getItem('d20_final_v16') || '[]'));
            const [hist, setHist] = useState(() => JSON.parse(localStorage.getItem('d20_hist_v16') || '{}'));
            const [selectedId, setSelectedId] = useState(null);
            const [calDate, setCalDate] = useState(new Date());
            
            // Workout State
            const [workout, setWorkout] = useState({ plan: [], idx: 0, seconds: 0 });
            const [isPlaying, setIsPlaying] = useState(false);
            const [timerOverride, setTimerOverride] = useState(false);
            const playerRef = useRef(null);

            useEffect(() => {
                localStorage.setItem('d20_final_v16', JSON.stringify(lib));
                localStorage.setItem('d20_hist_v16', JSON.stringify(hist));
            }, [lib, hist]);

            const getYTID = (u) => u?.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|.*\/|.*embed\/))([^&?\s]{11})/)?.[1];
            const isInsta = (u) => u?.includes('instagram.com');

            // Timer Logic
            useEffect(() => {
                let timer;
                if (view === 'workout' && isPlaying && !timerOverride && workout.seconds > 0) {
                    timer = setInterval(() => setWorkout(w => ({ ...w, seconds: w.seconds - 1 })), 1000);
                } else if (view === 'workout' && workout.seconds === 0 && workout.plan.length > 0) {
                    handleSkip();
                }
                return () => clearInterval(timer);
            }, [view, isPlaying, timerOverride, workout.seconds]);

            // Video Player Init
            useEffect(() => {
                if (view === 'workout' && workout.plan.length > 0) {
                    const vid = workout.plan[workout.idx];
                    if (!isInsta(vid.url)) {
                        const initYT = () => {
                            if (playerRef.current?.destroy) playerRef.current.destroy();
                            playerRef.current = new window.YT.Player('yt-player', {
                                videoId: getYTID(vid.url),
                                playerVars: { 'autoplay': 1, 'start': vid.start, 'playsinline': 1, 'controls': 1 },
                                events: { 'onStateChange': (e) => setIsPlaying(e.data === 1) }
                            });
                        };
                        window.YT ? initYT() : window.onYouTubeIframeAPIReady = initYT;
                    } else { setIsPlaying(true); }
                }
            }, [view, workout.idx]);

            const handleSkip = () => {
                if (workout.idx < workout.plan.length - 1) {
                    const next = workout.idx + 1;
                    setWorkout(w => ({ ...w, idx: next, seconds: parseInt(w.plan[next].dur) * 60 }));
                    setTimerOverride(false);
                } else { finish(); }
            };

            const finish = () => {
                const today = new Date().toISOString().split('T')[0];
                setHist({...hist, [today]: true });
                setView('home'); setSelectedId(null);
            };

            // Calendar Math
            const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
            const startDayOfMonth = new Date(calDate.getFullYear(), calDate.getMonth(), 1).getDay();
            const daysArr = [];
            const prevMonthDays = getDaysInMonth(calDate.getFullYear(), calDate.getMonth() - 1);
            
            for (let i = startDayOfMonth - 1; i >= 0; i--) daysArr.push({ day: prevMonthDays - i, current: false, dateStr: null });
            for (let i = 1; i <= getDaysInMonth(calDate.getFullYear(), calDate.getMonth()); i++) {
                const dateStr = `${calDate.getFullYear()}-${(calDate.getMonth()+1).toString().padStart(2,'0')}-${i.toString().padStart(2,'0')}`;
                daysArr.push({ day: i, current: true, dateStr });
            }

            return (
                <div className="container">
                    <h1 style={{color:'var(--neon)', textAlign:'center', marginBottom:'10px'}} onClick={() => {setView('home'); setIsPlaying(false);}}>DAILY20</h1>

                    {view === 'home' && (
                        <div>
                            <div className="card" style={{textAlign:'center'}}>
                                <div className="carousel">
                                    {lib.map(v => (
                                        <div key={v.id} className={`carousel-item ${selectedId === v.id ? 'selected' : ''}`} onClick={() => setSelectedId(selectedId === v.id ? null : v.id)}>
                                            <img className="carousel-thumb" src={isInsta(v.url) ? 'https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg' : `https://img.youtube.com/vi/${getYTID(v.url)}/mqdefault.jpg`} />
                                            <div style={{fontSize:'9px', marginTop:'4px', overflow:'hidden'}}>{v.title}</div>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => {
                                    if(!lib.length) return;
                                    const plan = selectedId ? [lib.find(v => v.id === selectedId), ...lib.filter(v => v.id !== selectedId)].slice(0,4) : lib.sort(() => 0.5 - Math.random()).slice(0,4);
                                    setWorkout({ plan, idx: 0, seconds: parseInt(plan[0].dur) * 60 });
                                    setView('workout');
                                }}>Start Training</button>
                                <button className="btn-sec" onClick={() => setView('lib')}>Edit Library</button>
                            </div>

                            <div className="card">
                                <div className="cal-header">
                                    <button className="nav-btn" onClick={() => setCalDate(new Date(calDate.setMonth(calDate.getMonth()-1)))}>&lt;</button>
                                    <h3 style={{margin:0}}>{calDate.toLocaleString('default', { month: 'long', year: 'numeric' })}</h3>
                                    <button className="nav-btn" onClick={() => setCalDate(new Date(calDate.setMonth(calDate.getMonth()+1)))}>&gt;</button>
                                </div>
                                <div className="cal-grid">
                                    {['S','M','T','W','T','F','S'].map(d => <div key={d} className="cal-day-label">{d}</div>)}
                                    {daysArr.map((d, i) => (
                                        <div key={i} className={`cal-cell ${d.current ? 'active-month' : ''} ${hist[d.dateStr] ? 'complete' : ''} ${d.dateStr === new Date().toISOString().split('T')[0] ? 'today' : ''}`}>
                                            {d.day}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'lib' && (
                        <div>
                            <form className="card" onSubmit={e => {
                                e.preventDefault(); const f = new FormData(e.target);
                                setLib([{ id: Date.now(), title: f.get('t'), url: f.get('u'), dur: f.get('d'), start: f.get('s') || 0 }, ...lib]);
                                e.target.reset();
                            }}>
                                <h3>Add Video</h3>
                                <input name="u" placeholder="YouTube or Instagram URL" required />
                                <input name="t" placeholder="Title" required />
                                <div style={{display:'flex', gap:'10px'}}>
                                    <input name="d" type="number" placeholder="Mins" required />
                                    <input name="s" type="number" placeholder="Start Sec" />
                                </div>
                                <button type="submit">Add to Library</button>
                            </form>
                            <div className="card">
                                {lib.map(v => (
                                    <div key={v.id} style={{display:'flex', justifyContent:'space-between', padding:'10px 0', borderBottom:'1px solid #333'}}>
                                        <span style={{fontSize:'13px'}}>{v.title}</span>
                                        <button onClick={() => setLib(lib.filter(x => x.id !== v.id))} style={{background:'var(--danger)', padding:'2px 10px', width:'auto', fontSize:'12px'}}>Delete</button>
                                    </div>
                                ))}
                            </div>
                            <button className="btn-sec" onClick={() => setView('home')}>Back</button>
                        </div>
                    )}

                    {view === 'workout' && (
                        <div style={{textAlign:'center'}}>
                            <div className={`player-wrapper ${isInsta(workout.plan[workout.idx].url) ? 'ratio-insta' : 'ratio-yt'}`}>
                                {isInsta(workout.plan[workout.idx].url) ? (
                                    <iframe className="insta-player" src={`${workout.plan[workout.idx].url.split('?')[0]}embed`} allowTransparency="true" allowFullScreen></iframe>
                                ) : (
                                    <div id="yt-player"></div>
                                )}
                            </div>
                            <div className={`status-tag ${!isPlaying ? 'status-paused' : timerOverride ? 'status-manual' : 'status-playing'}`}>
                                {!isPlaying ? 'II VIDEO PAUSED' : timerOverride ? 'II TIMER PAUSED' : '▶ TIMER ACTIVE'}
                            </div>
                            <div style={{fontSize:'54px', fontWeight:'900', color: (isPlaying && !timerOverride) ? 'var(--neon)' : 'var(--dim)'}}>
                                {Math.floor(workout.seconds/60)}:{(workout.seconds%60).toString().padStart(2,'0')}
                            </div>
                            <h4 style={{margin:'5px 0'}}>{workout.plan[workout.idx].title}</h4>
                            <button onClick={() => setTimerOverride(!timerOverride)} style={{background: timerOverride ? 'var(--success)' : 'var(--warning)', width:'100%', padding:'12px', marginBottom:'8px'}}>
                                {timerOverride ? 'Resume Clock' : 'Pause Clock'}
                            </button>
                            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px'}}>
                                <button className="btn-sec" onClick={handleSkip} style={{margin:0}}>⏭ Skip</button>
                                <button className="btn-sec" onClick={() => {setIsPlaying(false); setView('home');}} style={{margin:0}}>Exit</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
