<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily20 Pro | v62</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --neon: #ff9900; --text: #ffffff; --dim: #888888; --danger: #ff4d4d; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 10px; overflow: hidden; height: 100vh; }
        .container { max-width: 480px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; }
        .card { background: var(--card); padding: 16px; border-radius: 20px; margin-bottom: 12px; border: 1px solid #282828; }
        
        /* Header & Streak */
        .header-box { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 10px; }
        .app-title { color: var(--neon); margin: 0; font-size: 26px; font-weight: 900; letter-spacing: -1px; }
        .streak-badge { background: #332200; color: var(--neon); padding: 4px 10px; border-radius: 20px; font-size: 14px; font-weight: 800; border: 1px solid var(--neon); display: flex; align-items: center; gap: 4px; }

        /* Buttons & SVGs */
        .btn-row { display: flex; gap: 8px; margin-bottom: 12px; }
        button { background: var(--neon); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; flex: 1; }
        .btn-sec { background: #2a2a2a; color: white; }
        svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

        /* Carousel */
        .carousel { display: flex; overflow-x: auto; gap: 10px; padding: 5px 0 15px 0; scrollbar-width: none; }
        .carousel::-webkit-scrollbar { display: none; }
        .carousel-item { flex: 0 0 110px; }
        .thumb-wrap { position: relative; width: 110px; height: 62px; border-radius: 10px; overflow: hidden; border: 2.5px solid transparent; background: #000; }
        .selected .thumb-wrap { border-color: var(--neon); box-shadow: 0 0 12px var(--neon); }
        .dur-badge { position: absolute; bottom: 3px; right: 3px; background: rgba(0,0,0,0.85); font-size: 9px; padding: 2px 4px; border-radius: 3px; font-weight: bold; }

        /* Calendar */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .cal-day { aspect-ratio: 1; border-radius: 8px; background: #1f1f1f; font-size: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .cal-day.done { background: var(--neon); color: #000; font-weight: bold; }
        .cal-day.today { border: 1px solid var(--neon); }

        /* Player Optimization */
        .workout-ui { display: flex; flex-direction: column; height: 100vh; position: fixed; inset: 0; background: #000; z-index: 1000; }
        .player-frame { width: 100%; aspect-ratio: 16/9; background: #000; flex-shrink: 0; }
        iframe { width: 100%; height: 100%; border: none; }
        .workout-info { flex: 1; display: flex; flex-direction: column; justify-content: space-evenly; align-items: center; padding: 20px; text-align: center; }

        /* Modals */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 15px; backdrop-filter: blur(10px); }
        .modal { width: 100%; max-width: 400px; padding: 20px; border-radius: 24px; }
        input, textarea, select { background: #222; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; width: 100%; box-sizing: border-box; margin-bottom: 12px; font-size: 16px; }
        label { font-size: 10px; color: var(--neon); font-weight: 800; text-transform: uppercase; display: block; margin-bottom: 4px; }
        
        .splash { position: fixed; inset: 0; background: var(--neon); color: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icons = {
            Back: () => <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>,
            Export: () => <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>,
            Import: () => <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>,
            Fire: () => <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2c0 0-3.5 3.5-3.5 7.5s3.5 5.5 3.5 5.5s3.5-1.5 3.5-5.5S12 2 12 2z"/><path d="M12 22c3.866 0 7-3.134 7-7c0-1.5-.5-2.5-1.5-3.5c0 3-2 4.5-3.5 5.5s-2 2.5-2 5s.5 4 2 5z" opacity="0.5"/></svg>
        };

        const getLocalDateKey = (d = new Date()) => {
            const offset = d.getTimezoneOffset() * 60000;
            return new Date(d.getTime() - offset).toISOString().split('T')[0];
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [lib, setLib] = useState(() => JSON.parse(localStorage.getItem('d20_lib')) || []);
            const [hist, setHist] = useState(() => JSON.parse(localStorage.getItem('d20_hist')) || {});
            const [goal, setGoal] = useState(() => parseInt(localStorage.getItem('d20_goal')) || 20);
            
            const [selectedId, setSelectedId] = useState(null);
            const [offlineLog, setOfflineLog] = useState(false);
            const [inspecting, setInspecting] = useState(null);
            const [showSplash, setShowSplash] = useState(false);
            
            const [workout, setWorkout] = useState({ plan: [], idx: 0, secondsLeft: 0 });
            const [isPlaying, setIsPlaying] = useState(false);
            const [paused, setPaused] = useState(false);
            const playerRef = useRef(null);
            const accumRef = useRef(0);

            const todayKey = getLocalDateKey();
            const todayMins = hist[todayKey]?.totalMins || 0;

            // Calculate Streak
            const streak = useMemo(() => {
                let count = 0;
                let checkDate = new Date();
                while (true) {
                    const k = getLocalDateKey(checkDate);
                    if ((hist[k]?.totalMins || 0) >= goal) {
                        count++;
                        checkDate.setDate(checkDate.getDate() - 1);
                    } else {
                        // If it's today and not yet reached, don't break yet, check yesterday
                        if (k === todayKey) {
                            checkDate.setDate(checkDate.getDate() - 1);
                            continue;
                        }
                        break;
                    }
                }
                return count;
            }, [hist, goal, todayKey]);

            useEffect(() => {
                localStorage.setItem('d20_lib', JSON.stringify(lib));
                localStorage.setItem('d20_hist', JSON.stringify(hist));
                localStorage.setItem('d20_goal', goal.toString());
                
                if (todayMins >= goal && !localStorage.getItem(`splash_${todayKey}`)) {
                    setShowSplash(true);
                    localStorage.setItem(`splash_${todayKey}`, 'true');
                }
            }, [lib, hist, goal]);

            useEffect(() => {
                let ticker;
                if (view === 'workout' && isPlaying && !paused) {
                    ticker = setInterval(() => {
                        accumRef.current += 1;
                        if (accumRef.current >= 60) {
                            setHist(prev => ({
                                ...prev,
                                [todayKey]: { 
                                    totalMins: (prev[todayKey]?.totalMins || 0) + 1, 
                                    videos: prev[todayKey]?.videos || "" 
                                }
                            }));
                            accumRef.current = 0;
                        }
                        setWorkout(w => ({ ...w, secondsLeft: Math.max(0, w.secondsLeft - 1) }));
                    }, 1000);
                }
                return () => clearInterval(ticker);
            }, [view, isPlaying, paused]);

            const getMeta = (url) => {
                const yt = url.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|.*\/|.*embed\/))([^&?\s]{11})/);
                if (yt) return { type: 'yt', id: yt[1], thumb: `https://img.youtube.com/vi/${yt[1]}/mqdefault.jpg` };
                const ig = url.match(/(?:instagram\.com\/(?:p|reels|reel)\/)([^/?#&]+)/);
                if (ig) return { type: 'ig', id: ig[1], thumb: `https://images.weserv.nl/?url=www.instagram.com/p/${ig[1]}/media/?size=m` };
                return { type: 'web', id: null, thumb: 'https://placehold.co/100x60/222/ff9900?text=Video' };
            };

            return (
                <div className="container">
                    {showSplash && (
                        <div className="splash" onClick={() => setShowSplash(false)}>
                            <div style={{fontSize: 80}}>🏆</div>
                            <h1 style={{margin: '10px 0', fontWeight: 900}}>GOAL MET!</h1>
                            <p style={{fontSize: 18}}>Streak: {streak} Days</p>
                            <button className="btn-sec" style={{background:'#000', color: '#fff', marginTop:20}}>Awesome</button>
                        </div>
                    )}

                    <header className="header-box">
                        <h1 className="app-title">DAILY20</h1>
                        {streak > 0 && <div className="streak-badge"><Icons.Fire /> {streak}</div>}
                    </header>

                    {view === 'home' && (
                        <div style={{display:'flex', flexDirection:'column', flex:1}}>
                            <div className="card">
                                <label>Target Goal</label>
                                <select value={goal} onChange={e => setGoal(parseInt(e.target.value))}>
                                    {[10, 20, 30, 45, 60].map(g => <option key={g} value={g}>{g} Minutes</option>)}
                                </select>
                                
                                <div className="carousel">
                                    {lib.map(v => (
                                        <div key={v.id} className={`carousel-item ${selectedId === v.id ? 'selected' : ''}`} onClick={() => setSelectedId(v.id === selectedId ? null : v.id)}>
                                            <div className="thumb-wrap">
                                                <img src={getMeta(v.url).thumb} style={{width:'100%', height:'100%', objectFit:'cover'}} />
                                                <div className="dur-badge">{Math.floor(v.durSec/60)}m</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <button style={{marginTop:5}} disabled={lib.length === 0} onClick={() => {
                                    let pool = [...lib].sort(() => 0.5 - Math.random());
                                    if (selectedId) pool = [lib.find(x => x.id === selectedId), ...pool.filter(x => x.id !== selectedId)];
                                    const plan = pool.slice(0, 3);
                                    setWorkout({ plan, idx: 0, secondsLeft: plan[0].durSec });
                                    accumRef.current = 0; setView('workout');
                                }}>Start Workout</button>

                                <div className="btn-row" style={{marginTop:12}}>
                                    <button className="btn-sec" onClick={() => setOfflineLog(true)}>Offline Training</button>
                                    <button className="btn-sec" onClick={() => setView('lib')}>Library</button>
                                </div>
                            </div>

                            <div className="card" style={{flex:1, overflow:'hidden', display:'flex', flexDirection:'column'}}>
                                <div style={{textAlign:'center', fontSize:32, fontWeight:900, marginBottom:10}}>{Math.floor(todayMins)} <small style={{fontSize:16, color:'var(--dim)'}}>/ {goal}m</small></div>
                                <div className="cal-grid">
                                    {Array.from({length: 21}).map((_, i) => {
                                        const d = new Date(); d.setDate(d.getDate() - (20 - i));
                                        const k = getLocalDateKey(d);
                                        const m = hist[k]?.totalMins || 0;
                                        return (
                                            <div key={k} className={`cal-day ${m >= goal ? 'done' : ''} ${k === todayKey ? 'today' : ''}`} onClick={() => setInspecting({key: k, date: d.toDateString(), m, txt: hist[k]?.videos || ""})}>
                                                {d.getDate()}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'lib' && (
                        <div style={{height:'100%', overflowY:'auto'}}>
                            <div className="btn-row">
                                <button className="btn-sec btn-icon" onClick={() => setView('home')}><Icons.Back /></button>
                                <button className="btn-sec">Export</button>
                                <button className="btn-sec">Import</button>
                            </div>
                            <div className="card">
                                {lib.map(v => (
                                    <div key={v.id} style={{display:'flex', alignItems:'center', gap:12, padding:'12px 0', borderBottom:'1px solid #222'}}>
                                        <img src={getMeta(v.url).thumb} style={{width:60, borderRadius:8}} />
                                        <div style={{flex:1, fontSize:14}}>{v.title}</div>
                                        <button className="btn-sec" style={{width:40, padding:8}} onClick={() => setLib(lib.filter(x => x.id !== v.id))}>✕</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {view === 'workout' && (
                        <div className="workout-ui">
                            <div className="player-frame">
                                {getMeta(workout.plan[workout.idx].url).type === 'yt' ? (
                                    <iframe src={`https://www.youtube.com/embed/${getMeta(workout.plan[workout.idx].url).id}?autoplay=1&controls=1&modestbranding=1`} allow="autoplay"></iframe>
                                ) : (
                                    <iframe src={`${workout.plan[workout.idx].url.split('?')[0]}embed`} allowFullScreen></iframe>
                                )}
                            </div>
                            <div className="workout-info">
                                <div style={{fontSize:72, fontWeight:900, color: 'var(--neon)', fontVariantNumeric: 'tabular-nums'}}>
                                    {Math.floor(workout.secondsLeft/60)}:{(workout.secondsLeft%60).toString().padStart(2,'0')}
                                </div>
                                <h2 style={{margin:0, fontSize:20}}>{workout.plan[workout.idx].title}</h2>
                                <div style={{width:'100%'}}>
                                    <div className="btn-row">
                                        <button onClick={() => setPaused(!paused)}>{paused ? '▶ Resume' : '⏸ Pause'}</button>
                                        <button className="btn-sec" onClick={() => {
                                            if (workout.idx + 1 < workout.plan.length) {
                                                const nxt = workout.idx + 1;
                                                setWorkout({...workout, idx: nxt, secondsLeft: workout.plan[nxt].durSec});
                                            } else { setView('home'); }
                                        }}>Skip</button>
                                    </div>
                                    <button className="btn-sec" style={{marginTop:12, width:'100%'}} onClick={() => setView('home')}>🚪 Exit</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {offlineLog && (
                        <div className="overlay" onClick={() => setOfflineLog(false)}>
                            <div className="card modal" onClick={e => e.stopPropagation()}>
                                <h3 style={{marginTop:0}}>Manual Entry</h3>
                                <form onSubmit={e => {
                                    e.preventDefault();
                                    const f = new FormData(e.target);
                                    const m = parseInt(f.get('m'));
                                    const a = f.get('a');
                                    setHist(prev => ({
                                        ...prev,
                                        [todayKey]: { 
                                            totalMins: (prev[todayKey]?.totalMins || 0) + m, 
                                            videos: (prev[todayKey]?.videos || "") + (prev[todayKey]?.videos ? "||" : "") + a 
                                        }
                                    }));
                                    setOfflineLog(false);
                                }}>
                                    <label>Activity</label>
                                    <input name="a" required placeholder="Running, Yoga..." />
                                    <label>Minutes</label>
                                    <input type="number" name="m" required />
                                    <button type="submit">Log Training</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {inspecting && (
                        <div className="overlay" onClick={() => setInspecting(null)}>
                            <div className="card modal" onClick={e => e.stopPropagation()}>
                                <h3 style={{marginTop:0}}>{inspecting.date}</h3>
                                <label>Minutes Trained</label>
                                <input type="number" value={inspecting.m} onChange={e => setInspecting({...inspecting, m: parseInt(e.target.value)||0})} />
                                <label>Logged Activities</label>
                                <textarea rows="3" value={inspecting.txt} onChange={e => setInspecting({...inspecting, txt: e.target.value})} placeholder="Yoga||Pushups..." />
                                <div className="btn-row" style={{marginTop:10}}>
                                    <button onClick={() => {
                                        setHist({...hist, [inspecting.key]: {totalMins: inspecting.m, videos: inspecting.txt}});
                                        setInspecting(null);
                                    }}>💾 Save</button>
                                    <button className="btn-sec" onClick={() => setInspecting(null)}>Cancel</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
