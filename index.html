<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily20 Pro | v28</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --neon: #ff9900; --text: #ffffff; --dim: #888888; --danger: #ff4d4d; --info: #3498db; --warning: #f39c12; --success: #2ecc71; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; padding-bottom: 50px; }
        .card { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid #333; }
        input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; margin-bottom: 8px; width: 100%; box-sizing: border-box; font-size: 16px; }
        button { background: var(--neon); color: black; border: none; padding: 14px; border-radius: 10px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; }
        .btn-sec { background: #333; color: white; margin-top: 8px; }
        
        /* Stats & Goals */
        .daily-stat { background: #1e1e1e; border-radius: 16px; padding: 15px; text-align: center; margin-bottom: 15px; border: 1px solid #333; }
        .goal-selector { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
        .goal-btn { background: #2a2a2a; color: var(--dim); border: 1px solid #444; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .goal-btn.active { background: var(--neon); color: black; border-color: var(--neon); }
        .progress-container { background: #333; height: 10px; border-radius: 5px; margin: 15px 0 5px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--neon); transition: width 0.5s ease-in-out; box-shadow: 0 0 10px var(--neon); }

        /* Video Players */
        .player-wrapper { width: 100%; border-radius: 16px; overflow: hidden; background: #000; border: 1px solid #333; margin-bottom: 8px; position: relative; }
        .ratio-yt { aspect-ratio: 16/9; }
        .ratio-insta { aspect-ratio: 9/16; max-height: 55vh; }
        #yt-player, .insta-player { width: 100%; height: 100%; border: 0; display: block; }

        /* Carousel */
        .carousel { display: flex; overflow-x: auto; gap: 8px; padding: 5px; margin-bottom: 10px; scrollbar-width: none; }
        .carousel-item { flex: 0 0 90px; text-align: center; cursor: pointer; }
        .carousel-thumb { width: 90px; height: 55px; border-radius: 8px; object-fit: cover; border: 2px solid transparent; transition: 0.2s; }
        .selected .carousel-thumb { border-color: var(--neon); transform: scale(1.05); }

        /* Library Actions */
        .icon-btn-group { display: flex; gap: 10px; margin: 10px 0; }
        .icon-btn { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; flex: 1; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; }
        .icon-btn svg { width: 18px; height: 18px; margin-right: 8px; stroke: var(--neon); fill: none; stroke-width: 2; }
        
        .lib-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #2a2a2a; }
        .lib-info { flex-grow: 1; padding: 0 12px; overflow: hidden; }
        .lib-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .lib-sub { font-size: 11px; color: var(--dim); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            // SAFE DATA LOADING
            const loadData = (key, fallback) => {
                try {
                    const saved = localStorage.getItem(key);
                    return saved ? JSON.parse(saved) : fallback;
                } catch (e) { return fallback; }
            };

            const [view, setView] = useState('home');
            const [lib, setLib] = useState(() => loadData('d20_v28_lib', []));
            const [hist, setHist] = useState(() => loadData('d20_v28_hist', {}));
            const [goal, setGoal] = useState(() => parseInt(loadData('d20_v28_goal', '20')));
            
            const [selectedId, setSelectedId] = useState(null);
            const [editingVid, setEditingVid] = useState(null);
            const [workout, setWorkout] = useState({ plan: [], idx: 0, seconds: 0 });
            const [isPlaying, setIsPlaying] = useState(false);
            const [timerOverride, setTimerOverride] = useState(false);
            const playerRef = useRef(null);

            const todayKey = new Date().toISOString().split('T')[0];
            const todayMins = hist[todayKey]?.totalMins || 0;
            const progress = Math.min((todayMins / goal) * 100, 100);

            useEffect(() => {
                localStorage.setItem('d20_v28_lib', JSON.stringify(lib));
                localStorage.setItem('d20_v28_hist', JSON.stringify(hist));
                localStorage.setItem('d20_v28_goal', goal.toString());
            }, [lib, hist, goal]);

            const getYTID = (u) => u?.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|.*\/|.*embed\/))([^&?\s]{11})/)?.[1];
            const isInsta = (u) => u?.includes('instagram.com');
            const getThumb = (v) => isInsta(v.url) ? 'https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg' : `https://img.youtube.com/vi/${getYTID(v.url)}/mqdefault.jpg`;
            const getSegmentSecs = (v) => Math.max(0, (parseInt(v.dur) * 60) - parseInt(v.start || 0));

            const creditVideo = (vid) => {
                const mins = Math.max(1, Math.ceil(getSegmentSecs(vid) / 60));
                const day = hist[todayKey] || { complete: true, videos: "", totalMins: 0 };
                setHist({
                    ...hist,
                    [todayKey]: {
                        ...day,
                        videos: (day.videos ? day.videos + ", " : "") + vid.title,
                        totalMins: day.totalMins + mins
                    }
                });
            };

            // Timer Loop
            useEffect(() => {
                let timer;
                if (view === 'workout' && isPlaying && !timerOverride && workout.seconds > 0) {
                    timer = setInterval(() => setWorkout(w => ({ ...w, seconds: w.seconds - 1 })), 1000);
                } else if (view === 'workout' && workout.seconds <= 0 && workout.plan.length > 0) {
                    handleSkip();
                }
                return () => clearInterval(timer);
            }, [view, isPlaying, timerOverride, workout.seconds]);

            // Player Init
            useEffect(() => {
                if (view === 'workout' && workout.plan[workout.idx]) {
                    const vid = workout.plan[workout.idx];
                    if (!isInsta(vid.url)) {
                        const runYT = () => {
                            if (playerRef.current?.destroy) playerRef.current.destroy();
                            playerRef.current = new window.YT.Player('yt-player', {
                                videoId: getYTID(vid.url),
                                playerVars: { 'autoplay': 1, 'start': vid.start, 'playsinline': 1, 'controls': 1 },
                                events: { 'onStateChange': (e) => setIsPlaying(e.data === 1) }
                            });
                        };
                        window.YT && window.YT.Player ? runYT() : setTimeout(runYT, 1000);
                    } else { setIsPlaying(true); }
                }
            }, [view, workout.idx]);

            const handleSkip = () => {
                const currentVid = workout.plan[workout.idx];
                if (currentVid) creditVideo(currentVid);

                if (workout.idx < workout.plan.length - 1) {
                    const nextIdx = workout.idx + 1;
                    setWorkout(w => ({ ...w, idx: nextIdx, seconds: getSegmentSecs(w.plan[nextIdx]) }));
                    setTimerOverride(false);
                } else {
                    setView('home');
                    setIsPlaying(false);
                }
            };

            const handleExport = () => {
                const data = JSON.stringify({ lib, hist, goal, version: 'v28' });
                const blob = new Blob([data], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `daily20_backup.json`;
                a.click();
            };

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (data.lib) {
                            setLib(data.lib);
                            if (data.hist) setHist(data.hist);
                            if (data.goal) setGoal(data.goal);
                            alert("Import Successful!");
                        } else if (Array.isArray(data)) {
                            setLib(data);
                            alert("Video List Imported!");
                        }
                    } catch (err) { alert("Error reading file."); }
                    e.target.value = '';
                };
                reader.readAsText(file);
            };

            return (
                <div className="container">
                    <h1 style={{color:'var(--neon)', textAlign:'center', margin:'10px 0', letterSpacing:'2px'}} onClick={() => {setView('home'); setIsPlaying(false);}}>DAILY20</h1>

                    {view === 'home' && (
                        <div>
                            <div className="daily-stat">
                                <div style={{fontSize:'12px', color:'var(--dim)', textTransform:'uppercase', fontWeight:'bold'}}>Today's Progress</div>
                                <div style={{fontSize:'32px', fontWeight:'900', margin:'5px 0'}}>
                                    <span style={{color:'var(--neon)'}}>{todayMins}</span> / {goal} <span style={{fontSize:'14px', color:'var(--dim)'}}>MINS</span>
                                </div>
                                <div className="progress-container"><div className="progress-bar" style={{width: `${progress}%`}}></div></div>
                                <div className="goal-selector">
                                    {[20, 40, 60].map(g => (
                                        <div key={g} className={`goal-btn ${goal === g ? 'active' : ''}`} onClick={() => setGoal(g)}>{g}m</div>
                                    ))}
                                </div>
                            </div>

                            <div className="card" style={{textAlign:'center'}}>
                                <div className="carousel">
                                    {lib.map(v => (
                                        <div key={v.id} className={`carousel-item ${selectedId === v.id ? 'selected' : ''}`} onClick={() => setSelectedId(selectedId === v.id ? null : v.id)}>
                                            <img className="carousel-thumb" src={getThumb(v)} />
                                            <div style={{fontSize:'9px', marginTop:'4px', whiteSpace:'nowrap', overflow:'hidden'}}>{v.title}</div>
                                        </div>
                                    ))}
                                    {lib.length === 0 && <div style={{width:'100%', color:'var(--dim)', padding:'20px'}}>Library is empty. Add videos in settings!</div>}
                                </div>
                                <button disabled={lib.length === 0} onClick={() => {
                                    const plan = selectedId ? [lib.find(v => v.id === selectedId), ...lib.filter(v => v.id !== selectedId)].slice(0,4) : [...lib].sort(() => 0.5 - Math.random()).slice(0,4);
                                    setWorkout({ plan, idx: 0, seconds: getSegmentSecs(plan[0]) });
                                    setView('workout');
                                }}>Start Training</button>
                                <button className="btn-sec" onClick={() => setView('lib')}>Manage Library</button>
                            </div>
                        </div>
                    )}

                    {view === 'lib' && (
                        <div>
                            <div className="card">
                                <button onClick={() => setView('home')}>← Back to Home</button>
                                <div className="icon-btn-group">
                                    <div className="icon-btn" onClick={handleExport}>
                                        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m12-7-5-5-5 5m5-5v12"/></svg> Export
                                    </div>
                                    <label className="icon-btn">
                                        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5m-5 5V3"/></svg> Import
                                        <input type="file" style={{display:'none'}} accept=".json" onChange={handleImport} />
                                    </label>
                                </div>
                            </div>

                            <form className="card" onSubmit={e => {
                                e.preventDefault(); const f = new FormData(e.target);
                                setLib([{ id: Date.now(), title: f.get('t'), url: f.get('u'), dur: f.get('d'), start: f.get('s') || 0 }, ...lib]);
                                e.target.reset();
                            }}>
                                <h3 style={{marginTop:0}}>Add Video</h3>
                                <input name="u" placeholder="YouTube/Instagram URL" required />
                                <input name="t" placeholder="Title (e.g. Morning Yoga)" required />
                                <div style={{display:'flex', gap:'10px'}}>
                                    <input name="d" type="number" placeholder="End Mins" required />
                                    <input name="s" type="number" placeholder="Start Sec" />
                                </div>
                                <button type="submit">Add to Library</button>
                            </form>

                            <div className="card">
                                {lib.map(v => (
                                    <div key={v.id} className="lib-row">
                                        <img src={getThumb(v)} style={{width:'50px', height:'35px', borderRadius:'4px'}} />
                                        <div className="lib-info">
                                            <span className="lib-title">{v.title}</span>
                                            <span className="lib-sub">{v.dur}m (Start: {v.start}s)</span>
                                        </div>
                                        <div style={{display:'flex', gap:'5px'}}>
                                            <button onClick={() => setEditingVid(v)} style={{background:'var(--info)', width:'35px', padding:'8px'}}>✎</button>
                                            <button onClick={() => setLib(lib.filter(x => x.id !== v.id))} style={{background:'var(--danger)', width:'35px', padding:'8px'}}>✕</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {view === 'workout' && workout.plan[workout.idx] && (
                        <div style={{textAlign:'center'}}>
                            <div className={`player-wrapper ${isInsta(workout.plan[workout.idx].url) ? 'ratio-insta' : 'ratio-yt'}`}>
                                {isInsta(workout.plan[workout.idx].url) ? 
                                    <iframe className="insta-player" src={`${workout.plan[workout.idx].url.split('?')[0]}embed`} allowTransparency="true" allowFullScreen></iframe> 
                                    : <div id="yt-player"></div>}
                            </div>
                            <div className="card">
                                <div style={{fontSize:'48px', fontWeight:'900', color: isPlaying ? 'var(--neon)' : 'var(--dim)'}}>
                                    {Math.floor(workout.seconds/60)}:{(workout.seconds%60).toString().padStart(2,'0')}
                                </div>
                                <p style={{fontWeight:'bold', margin:'10px 0'}}>{workout.plan[workout.idx].title}</p>
                                <button onClick={() => setTimerOverride(!timerOverride)} style={{background: timerOverride ? 'var(--success)' : 'var(--warning)', marginBottom:'10px'}}>
                                    {timerOverride ? 'Resume Timer' : 'Pause Timer'}
                                </button>
                                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px'}}>
                                    <button className="btn-sec" onClick={handleSkip}>Skip</button>
                                    <button className="btn-sec" onClick={() => {setIsPlaying(false); setView('home');}}>Exit</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {editingVid && (
                        <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.9)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:5000, padding:'20px'}}>
                            <form className="card" style={{width:'100%'}} onSubmit={e => {
                                e.preventDefault(); const f = new FormData(e.target);
                                setLib(lib.map(v => v.id === editingVid.id ? {...v, title: f.get('t'), url: f.get('u'), dur: f.get('d'), start: f.get('s') || 0 } : v));
                                setEditingVid(null);
                            }}>
                                <h3>Edit Video</h3>
                                <input name="u" defaultValue={editingVid.url} required />
                                <input name="t" defaultValue={editingVid.title} required />
                                <input name="d" type="number" defaultValue={editingVid.dur} required />
                                <input name="s" type="number" defaultValue={editingVid.start} />
                                <button type="submit">Save</button>
                                <button type="button" className="btn-sec" onClick={() => setEditingVid(null)}>Cancel</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
