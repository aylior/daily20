<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 256 256'><rect width='256' height='256' rx='60' fill='black'/><path d='M45 35 L220 128 L45 221 Z' fill='black' stroke='%23FF9900' stroke-width='15' stroke-linejoin='round'/><text x='115' y='138' text-anchor='middle' font-family='sans-serif' font-weight='900' font-size='72' fill='%23FF9900'>UT</text></svg>">
    <title>UTrainTube</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --neon: #ff9900; --text: #ffffff; --dim: #888888; --danger: #ff4d4d; --safe: #2ecc71; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 10px; overflow-x: hidden; height: 100vh; }
        .container { max-width: 480px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; position: relative; }
        
        .header-box { display: flex; flex-direction: row; align-items: center; justify-content: center; margin-bottom: 25px; gap: 15px; position: relative; }
        .app-icon-svg { width: 55px; height: 55px; flex-shrink: 0; }
        .title-row { display: flex; align-items: baseline; gap: 10px; }
        .app-title { color: var(--neon); margin: 0; font-size: 32px; font-weight: 900; letter-spacing: -1px; line-height: 1; }
        .v-tag { color: var(--dim); font-size: 12px; font-family: monospace; font-weight: 700; white-space: nowrap; }
        .settings-btn { position: absolute; right: 0; top: 50%; transform: translateY(-50%); color: var(--dim); cursor: pointer; padding: 5px; }
        
        .card { background: var(--card); padding: 16px; border-radius: 20px; margin-bottom: 12px; border: 1px solid #282828; }
        .btn-row { display: flex; gap: 8px; margin-bottom: 12px; }
        button { background: var(--neon); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 13px; flex: 1; transition: opacity 0.2s; }
        .btn-sec { background: #2a2a2a; color: white; }
        .btn-neon-ghost { background: transparent; color: var(--neon); border: 1.5px solid var(--neon); }
        .btn-danger-ghost { background: transparent; color: var(--danger); border: 1.5px solid var(--danger); }
        .btn-icon { width: 40px; height: 40px; flex: none; padding: 0; }
        svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        
        input, select, textarea { background: #222; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; font-size: 14px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-family: inherit; }
        label { font-size: 10px; font-weight: 800; color: var(--neon); text-transform: uppercase; margin-bottom: 4px; display: block; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 8px; }
        .cal-day { aspect-ratio: 1; border-radius: 8px; background: #1f1f1f; font-size: 9px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border: 1.5px solid transparent; }
        .cal-day.today { border: 2px solid var(--neon); background: #222; }
        .cal-day.has-data { color: var(--neon); }
        .cal-m { font-weight: 900; font-size: 10px; }
        .streak-box { text-align: center; color: var(--neon); font-weight: 800; font-size: 14px; margin-top: 15px; padding-top: 10px; border-top: 1px solid #222; }
        .carousel { display: flex; overflow-x: auto; gap: 12px; padding: 10px 0 20px 0; scrollbar-width: none; }
        .carousel::-webkit-scrollbar { display: none; }
        .thumb-wrap { position: relative; width: 120px; height: 68px; border-radius: 12px; overflow: hidden; border: 2px solid transparent; background: #000; flex-shrink: 0; transition: all 0.2s; cursor: pointer; }
        .thumb-wrap.selected { border-color: var(--neon); box-shadow: 0 0 15px rgba(255, 153, 0, 0.4); transform: scale(1.05); }
        .dur-badge { position: absolute; bottom: 3px; right: 3px; font-size: 9px; font-weight: 800; background: rgba(0,0,0,0.8); padding: 2px 4px; border-radius: 4px; color: var(--neon); }
        .workout-ui { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; }
        .player-frame { width: 100%; flex: 1; background: #000; }
        .player-frame iframe { width: 100%; height: 100%; border: none; }
        .workout-footer { background: var(--bg); padding: 20px 20px 40px; border-top: 1px solid #333; text-align: center; }
        .timer-display { font-size: 64px; font-weight: 900; color: var(--neon); font-variant-numeric: tabular-nums; line-height: 1; margin-bottom: 5px; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 15px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const AppIcon = () => (
            <svg className="app-icon-svg" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="256" height="256" rx="60" fill="#000000"/>
                <path d="M 45 35 L 220 128 L 45 221 Z" fill="#000000" stroke="#FF9900" strokeWidth="15" strokeLinejoin="round" shapeRendering="geometricPrecision"/>
                <text x="115" y="138" dominantBaseline="middle" textAnchor="middle" fontFamily="system-ui, sans-serif" fontWeight="900" fontSize="72" fill="#FF9900">UT</text>
            </svg>
        );

        const Icons = {
            Back: () => <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>,
            Edit: () => <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            Trash: () => <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            Export: () => <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>,
            Import: () => <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>,
            X: () => <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Search: () => <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            Pause: () => <svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>,
            Play: () => <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
            Settings: () => <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        };

        const getLocalDateKey = (d = new Date()) => {
            const offset = d.getTimezoneOffset() * 60000;
            return new Date(d.getTime() - offset).toISOString().split('T')[0];
        };

        const formatTime = (secs) => {
            const s = Math.max(0, Math.floor(secs));
            return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;
        };

        const parseTime = (str) => {
            if (!str) return 0;
            const p = str.split(':');
            if (p.length === 1) return parseInt(p[0]) || 0;
            return (parseInt(p[0]) * 60) + (parseInt(p[1]) || 0);
        };

        const getMeta = (url) => {
            if (!url) return { type: 'none', id: null, thumb: '' };
            const yt = url.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|.*\/|.*embed\/))([^&?\s]{11})/);
            if (yt) return { type: 'yt', id: yt[1], thumb: `https://img.youtube.com/vi/${yt[1]}/mqdefault.jpg` };
            const ig = url.match(/(?:instagram\.com\/(?:p|reels|reel)\/)([^/?#&]+)/);
            if (ig) return { type: 'ig', id: ig[1], thumb: `https://images.weserv.nl/?url=https://www.instagram.com/p/${ig[1]}/media/?size=m&w=200` };
            return { type: 'web', id: null, thumb: 'https://placehold.co/100x60/222/ff9900?text=VIDEO' };
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [lib, setLib] = useState(() => JSON.parse(localStorage.getItem('d20_lib')) || []);
            const [hist, setHist] = useState(() => JSON.parse(localStorage.getItem('d20_hist')) || {});
            const [goal, setGoal] = useState(() => parseInt(localStorage.getItem('d20_goal')) || 20);
            
            const [selectedId, setSelectedId] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [inspecting, setInspecting] = useState(null);
            const [manualLog, setManualLog] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [editVideo, setEditVideo] = useState(null);
            
            const [workout, setWorkout] = useState({ plan: [], idx: 0, secondsLeft: 0, isActive: false });
            const [playerPaused, setPlayerPaused] = useState(true);
            const playerRef = useRef(null);
            const fileInputRef = useRef(null);
            const todayKey = getLocalDateKey();

            useEffect(() => {
                localStorage.setItem('d20_lib', JSON.stringify(lib));
                localStorage.setItem('d20_hist', JSON.stringify(hist));
                localStorage.setItem('d20_goal', goal.toString());
            }, [lib, hist, goal]);

            const getDailyTotal = (key) => {
                const day = hist[key];
                if (!day || !day.items) return 0;
                return day.items.reduce((acc, item) => acc + (parseFloat(item.mins) || 0), 0);
            };

            const streak = useMemo(() => {
                let count = 0; let check = new Date();
                while (true) {
                    const k = getLocalDateKey(check);
                    if (getDailyTotal(k) >= goal) { count++; check.setDate(check.getDate() - 1); }
                    else { if (k === todayKey) { check.setDate(check.getDate() - 1); continue; } break; }
                }
                return count;
            }, [hist, goal, todayKey]);

            const exportData = () => {
                const bundle = { lib, hist, goal, exportedAt: new Date().toISOString() };
                const blob = new Blob([JSON.stringify(bundle, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `UTrainTube_Backup_${todayKey}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = JSON.parse(evt.target.result);
                        if (data.lib) setLib(data.lib);
                        if (data.hist) setHist(data.hist);
                        if (data.goal) setGoal(data.goal);
                        alert("Data Successfully Restored!");
                        setShowSettings(false);
                    } catch (err) { alert("Import Error: Invalid backup file."); }
                };
                reader.readAsText(file);
            };

            useEffect(() => {
                let ticker;
                if (workout.isActive && !playerPaused) {
                    ticker = setInterval(() => {
                        setWorkout(w => ({ ...w, secondsLeft: Math.max(0, w.secondsLeft - 1) }));
                        setHist(prev => {
                            const day = prev[todayKey] || { items: [] };
                            const label = workout.plan[workout.idx]?.title || "Training";
                            let items = [...(day.items || [])];
                            let match = items.find(i => i.label === label);
                            if (match) match.mins = (parseFloat(match.mins) || 0) + (1/60);
                            else items.push({ label, mins: 1/60 });
                            return { ...prev, [todayKey]: { items } };
                        });
                    }, 1000);
                }
                return () => clearInterval(ticker);
            }, [workout.isActive, playerPaused, workout.idx]);

            useEffect(() => {
                if (view === 'workout' && !window.YT) {
                    const tag = document.createElement('script');
                    tag.src = "https://www.youtube.com/iframe_api";
                    document.head.appendChild(tag);
                    window.onYouTubeIframeAPIReady = initPlayer;
                } else if (view === 'workout') { initPlayer(); }
            }, [view, workout.idx]);

            const initPlayer = () => {
                if (playerRef.current && playerRef.current.destroy) playerRef.current.destroy();
                const currentV = workout.plan[workout.idx];
                const meta = getMeta(currentV?.url);
                if (meta.type === 'yt') {
                    playerRef.current = new YT.Player('player', {
                        height: '100%', width: '100%', videoId: meta.id,
                        playerVars: { autoplay: 1, start: currentV.startSec || 0 },
                        events: { 'onStateChange': (e) => setPlayerPaused(e.data !== YT.PlayerState.PLAYING) }
                    });
                } else { setPlayerPaused(false); }
            };

            const handleVideoSave = (e) => {
                e.preventDefault();
                const f = new FormData(e.target);
                const data = { id: editVideo ? editVideo.id : Date.now(), title: f.get('t'), url: f.get('u'), durSec: parseTime(f.get('d')), startSec: parseTime(f.get('s')) };
                if (editVideo) setLib(lib.map(v => v.id === editVideo.id ? data : v));
                else setLib([data, ...lib]);
                setEditVideo(null);
                e.target.reset();
            };

            return (
                <div className="container">
